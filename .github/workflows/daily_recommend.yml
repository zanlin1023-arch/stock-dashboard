name: Daily Stock Recommendations

on:
  schedule:
    # 평일 KST 16:30 (UTC 07:30) — 장 마감 직후
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      session:
        description: 'Session (morning/intraday/evening)'
        type: choice
        default: evening
        options: [morning, intraday, evening]
      top_n:
        description: 'Top N per tier'
        default: '5'

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fontconfig
          fc-cache -fv

      - name: Run daily recommendation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          TZ: Asia/Seoul
        run: |
          SESSION="${{ inputs.session || 'evening' }}"
          TOP_N="${{ inputs.top_n || '5' }}"
          python scripts/daily_recommend.py --session "$SESSION" --top-n "$TOP_N"

      - name: Summary
        if: always()
        run: |
          echo "## 🎯 일일 추천 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "- Session: ${{ inputs.session || 'evening' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
