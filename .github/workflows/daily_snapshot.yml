name: Daily Stock Snapshot

on:
  # 평일 18:00 KST (=09:00 UTC) 매일 자동 실행
  schedule:
    - cron: '0 9 * * 1-5'
  # 수동 실행 가능 (GitHub UI에서 "Run workflow" 클릭)
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: 🇰🇷 Install Korean fonts (matplotlib)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fontconfig
          fc-cache -fv

      - name: 📸 Run daily snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          TZ: Asia/Seoul
        run: |
          python scripts/daily_snapshot.py

      - name: 📊 Job Summary
        if: always()
        run: |
          echo "## 📸 일일 스냅샷 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "- 트리거: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 상태: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
